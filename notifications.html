<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notifications | Sharenet Reimagined</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">ShareNet</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="groups.html">Groups</a></li>
        <li>
          <a href="notifications.html" class="active" id="navNotificationsLink"
            >Notifications</a
          >
        </li>
        <li><a href="messenger.html">Messenger</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="members.html">Members</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="calendar.html">Calendar</a></li>
      </ul>
      <div
        class="nav-right-container"
        style="display: flex; align-items: center; gap: 18px"
      >
        <div
          id="notificationBellBtn"
          class="bell-wrapper"
          style="
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
          "
        >
          <svg
            class="bell-icon"
            width="26"
            height="26"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#bb86fc"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          <span
            id="notificationBadge"
            class="badge"
            style="
              display: none;
              position: absolute;
              top: -6px;
              right: -8px;
              background-color: #cf6679;
              color: #121212;
              font-size: 11px;
              font-weight: bold;
              padding: 2px 6px;
              border-radius: 10px;
              min-width: 18px;
              text-align: center;
            "
            >0</span
          >
        </div>
        <div
          id="navProfileAvatar"
          class="nav-profile-avatar"
          style="
            width: 36px;
            height: 36px;
            background-color: #bb86fc;
            color: #121212;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
          "
        >
          ?
        </div>
        <div class="login-btn">
          <button id="authNavBtn">Log In</button>
        </div>
      </div>
    </nav>

    <main class="container">
      <section class="updates-section" style="flex: 1">
        <h2>Activity Log & Notifications</h2>
        <div
          id="notificationsContainer"
          style="
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
          "
        >
          <p class="loading-text">Loading stream activity...</p>
        </div>
      </section>
    </main>

    <div id="authModal" class="modal-overlay">
      <div class="modal-box">
        <span id="closeModal" class="close-btn">&times;</span>
        <h2 id="modalTitle">Log In</h2>
        <form id="authForm">
          <div class="input-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              required
              placeholder="Enter school email"
            />
          </div>
          <div class="input-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              required
              placeholder="Enter password"
            />
          </div>
          <button type="submit" id="authSubmitBtn" class="submit-btn">
            Log In
          </button>
        </form>
        <p class="toggle-text">
          <span id="toggleMsg">Don't have an account?</span>
          <a href="#" id="toggleAuthMode">Sign Up</a>
        </p>
      </div>
    </div>

    <footer>
      <p>&copy; 2026 ShareNet Hub. Connecting creators, sharing visions.</p>
    </footer>

    <script type="module" src="notifications.js"></script>

    <script type="module" src="shared.js"></script>
  </body>
</html>
