<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Under Construction | Sharenet Reimagined</title>
    <style>
      /* Complete Fullscreen Black Styling */
      body {
        margin: 0;
        padding: 0;
        background-color: #000000;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* Modal Box Design */
      .dev-modal {
        background-color: #1e1e1e;
        padding: 40px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
        border: 1px solid #333;
        max-width: 400px;
        width: 90%;
      }

      .dev-modal h2 {
        color: #bb86fc;
        margin-bottom: 10px;
        font-size: 24px;
      }

      .dev-modal p {
        color: #b3b3b3;
        margin-bottom: 25px;
        font-size: 16px;
      }

      .close-home-btn {
        background-color: #bb86fc;
        color: #121212;
        border: none;
        padding: 12px 30px;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        font-size: 16px;
        transition: background 0.2s;
      }

      .close-home-btn:hover {
        background-color: #9965f4;
      }
    </style>
  </head>
  <body>
    <div class="dev-modal">
      <h2>Under Development</h2>
      <p>
        This page is currently being reimagined. Check back soon for updates!
      </p>
      <button
        class="close-home-btn"
        onclick="window.location.href='index.html'"
      >
        Close
      </button>
    </div>
  </body>
</html>
